<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <div class="header-left">
            <span class="header-icon">🏀</span>
            <span class="header-title">NBA Dashboard</span>
        </div>
        <div class="header-controls">
            <input type="date" id="date-picker">
            <button id="refresh-btn">Rafraichir</button>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="games"><span class="tab-icon">🏀</span><span class="tab-label-full">Matchs</span><span class="tab-label-short">Matchs</span></div>
        <div class="tab" data-tab="east"><span class="tab-icon">🏆</span><span class="tab-label-full">Classement Est</span><span class="tab-label-short">Est</span></div>
        <div class="tab" data-tab="west"><span class="tab-icon">🏆</span><span class="tab-label-full">Classement Ouest</span><span class="tab-label-short">Ouest</span></div>
        <div class="tab" data-tab="videos"><span class="tab-icon">📺</span><span class="tab-label-full">Videos</span><span class="tab-label-short">Videos</span></div>
        <div class="tab" data-tab="tiktok"><span class="tab-icon">🎵</span><span class="tab-label-full">TikTok</span><span class="tab-label-short">TikTok</span></div>
        <div class="tab" data-tab="ffbb"><span class="tab-icon">🏀</span><span class="tab-label-full">USBC</span><span class="tab-label-short">USBC</span></div>
    </div>

    <div class="content">
        <section id="games-section" class="tab-content active">
            <div class="section-title">Matchs du <span id="games-date"></span></div>
            <div id="games-list"></div>
            <p id="no-games" class="empty-message" hidden>Pas de matchs pour cette date</p>
        </section>

        <section id="east-section" class="tab-content">
            <div class="section-title">Classement — Conference Est</div>
            <div id="east-standings"></div>
        </section>

        <section id="west-section" class="tab-content">
            <div class="section-title">Classement — Conference Ouest</div>
            <div id="west-standings"></div>
        </section>

        <section id="videos-section" class="tab-content">
            <div class="section-title">Prime Video Sport FR</div>
            <div id="videos-list"></div>
            <p id="no-videos" class="empty-message" hidden>Aucune video disponible</p>
        </section>

        <section id="tiktok-section" class="tab-content">
            <div class="section-title">@beyond_the_hoop</div>
            <div id="tiktok-list" class="tiktok-list"></div>
            <p id="no-tiktok" class="empty-message" hidden>Aucune video disponible</p>
        </section>

        <section id="ffbb-section" class="tab-content">
            <div class="ffbb-team-picker">
                <label for="ffbb-team-select">Équipe :</label>
                <select id="ffbb-team-select"></select>
            </div>
            <div id="ffbb-content"></div>
        </section>

        <div id="spinner" class="spinner" hidden>
            <div class="spinner-circle"></div>
        </div>

        <div id="error-message" class="error-message" hidden></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
